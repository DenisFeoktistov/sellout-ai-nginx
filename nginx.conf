events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr forwarded for $http_x_real_ip - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name sellout.su;
        client_max_body_size 100M;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name sellout.su;
        client_max_body_size 100M;

        ssl_certificate /run/secrets/ssl_certificate;
        ssl_certificate_key /run/secrets/ssl_certificate_key;

        location /api/ {
            proxy_pass http://sellout-ai-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass http://sellout-ai-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /email_confirmed/ {
            proxy_pass http://sellout-ai-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /robots.txt {
            proxy_pass http://sellout-ai-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin/ {
            proxy_pass http://sellout-ai-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /mail/ {
            proxy_pass http://sellout-mail:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-bucket/ {
            rewrite ^/sellout-bucket/(.*)$ /$1 break;

            proxy_pass http://cl-msb41af28f.edgecdn.ru;
            proxy_set_header Host sellout.su;
        }

        location /sellout-ai-captcha-images-solver/ {
            set $captcha_images_solver_upstream "sellout-ai-captcha-images-solver:5000";
            proxy_pass http://$captcha_images_solver_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-captcha-images-solver-2/ {
            set $captcha_images_solver_2_upstream "sellout-ai-captcha-images-solver-2:5000";
            proxy_pass http://$captcha_images_solver_2_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-chinese-symbols-image-analyzer/ {
            set $chinese_symbols_image_analyzer_upstream "sellout-ai-chinese-symbols-image-analyzer:5000";
            proxy_pass http://$chinese_symbols_image_analyzer_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-dewu-api-parser/ {
            set $dewu_api_parser_upstream "sellout-ai-dewu-api-parser:5000";
            proxy_pass http://$dewu_api_parser_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-parser-manager/ {
            set $parser_manager_upstream "sellout-ai-parser-manager:5000";
            proxy_pass http://$parser_manager_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-trajectory-generator/ {
            set $trajectory_generator_upstream "sellout-ai-trajectory-generator:5000";
            proxy_pass http://$trajectory_generator_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sellout-ai-unicorn-parser/ {
            set $unicorn_parser_upstream "sellout-ai-unicorn-parser:5000";
            proxy_pass http://$unicorn_parser_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://sellout-ai-frontend-main:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
